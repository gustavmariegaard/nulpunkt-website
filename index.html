<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nulpunkt</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Inter',sans-serif;}
canvas{position:fixed;inset:0;z-index:0;}

/* INTRO OVERLAY */
#intro{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;cursor:none;}
#intro-text{font-family:'Space Mono',monospace;font-size:clamp(4rem,12vw,10rem);font-weight:700;letter-spacing:0.1em;color:#fff;mix-blend-mode:difference;user-select:none;transition:opacity 0.5s;}

/* CUSTOM CURSOR */
#cur{position:fixed;width:12px;height:12px;border-radius:50%;background:#fff;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform 0.1s,width 0.2s,height 0.2s;}
#cur2{position:fixed;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.4);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.12s;}

/* PANELS — horizontal scroll */
#panels{position:fixed;inset:0;z-index:10;display:flex;width:500vw;transition:transform 0.9s cubic-bezier(0.77,0,0.175,1);}
.panel{width:100vw;height:100vh;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}

/* NAV DOTS */
#dots{position:fixed;right:2rem;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:10px;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);cursor:pointer;transition:all 0.3s;}
.dot.active{background:#fff;transform:scale(1.4);}

/* PANEL 0 — HERO */
#p0 .big{font-family:'Space Mono',monospace;font-size:clamp(5rem,15vw,14rem);font-weight:700;line-height:0.85;letter-spacing:-0.02em;color:#fff;mix-blend-mode:difference;position:relative;z-index:2;}
#p0 .sub{position:absolute;bottom:3rem;left:3rem;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.3);}
#p0 .nav-hint{position:absolute;bottom:3rem;right:3rem;font-size:0.7rem;letter-spacing:0.2em;color:rgba(255,255,255,0.2);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:0.2}50%{opacity:0.7}}

/* PANEL 1 — ABOUT: text scramble reveal */
#p1{background:#fff;color:#000;}
#p1 .about-word{font-size:clamp(1.5rem,4vw,3.5rem);font-weight:900;line-height:1.1;max-width:700px;padding:3rem;}
#p1 .about-word span{display:inline-block;opacity:0;transform:translateY(30px);transition:all 0.6s;}
#p1 .label{position:absolute;top:3rem;left:3rem;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:#999;}

/* PANEL 2 — SKILLS: radial */
#p2{background:#000;}
#p2 canvas{position:absolute;inset:0;width:100%;height:100%;}
#p2 .center-label{position:absolute;text-align:center;font-family:'Space Mono',monospace;}
#p2 .center-label h2{font-size:clamp(2rem,5vw,4rem);font-weight:700;color:#fff;}
#p2 .center-label p{font-size:0.7rem;letter-spacing:0.3em;color:rgba(255,255,255,0.3);margin-top:0.5rem;text-transform:uppercase;}

/* PANEL 3 — PRICING */
#p3{background:#000;}
#p3 .price-wrap{position:relative;z-index:2;text-align:center;}
#p3 .price-word{font-family:'Space Mono',monospace;font-size:clamp(4rem,12vw,10rem);font-weight:700;letter-spacing:0.1em;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,0.3);transition:all 0.3s;cursor:default;}
#p3 .price-word:hover{-webkit-text-stroke:1px #fff;color:#fff;text-shadow:0 0 60px rgba(255,255,255,0.4);}
#p3 .price-sub{font-size:0.7rem;letter-spacing:0.3em;color:rgba(255,255,255,0.2);margin-top:1rem;text-transform:uppercase;}
#p3 .label{position:absolute;top:3rem;left:3rem;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.3);}

/* PANEL 4 — CONTACT */
#p4{background:#fff;color:#000;align-items:stretch;}
#p4 .contact-inner{display:grid;grid-template-columns:1fr 1fr;width:100%;height:100%;}
#p4 .contact-left{display:flex;align-items:flex-end;padding:3rem;border-right:1px solid rgba(0,0,0,0.1);}
#p4 .contact-left h2{font-size:clamp(4rem,10vw,9rem);font-weight:900;line-height:0.85;letter-spacing:-0.03em;}
#p4 .contact-right{display:flex;flex-direction:column;justify-content:center;padding:3rem;gap:0.75rem;}
input,textarea{width:100%;padding:1rem;border:none;border-bottom:1px solid rgba(0,0,0,0.15);background:transparent;font-family:'Inter',sans-serif;font-size:0.9rem;color:#000;outline:none;transition:border-color 0.2s;resize:none;}
input::placeholder,textarea::placeholder{color:#bbb;}
input:focus,textarea:focus{border-color:#000;}
textarea{height:100px;}
.btn{padding:1rem;background:#000;color:#fff;border:none;font-family:'Inter',sans-serif;font-size:0.8rem;letter-spacing:0.15em;cursor:pointer;text-transform:lowercase;}
.btn:hover{opacity:0.7;}

/* MOBILE */
@media(max-width:700px){
  #p4 .contact-inner{grid-template-columns:1fr;overflow-y:auto;}
  #p4 .contact-left{align-items:flex-start;border-right:none;border-bottom:1px solid rgba(0,0,0,0.1);padding:2rem;}
  #p4 .contact-right{padding:2rem;}
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur2"></div>

<canvas id="bg"></canvas>

<div id="intro"><div id="intro-text">nulpunkt</div></div>

<div id="panels">
  <div class="panel" id="p0">
    <div class="big">nul<br>punkt</div>
    <div class="sub">e-commerce · architecture · systems</div>
    <div class="nav-hint">→ scroll or drag</div>
  </div>
  <div class="panel" id="p1">
    <div class="label">about</div>
    <div class="about-word" id="aboutText"></div>
  </div>
  <div class="panel" id="p2">
    <canvas id="skillCanvas"></canvas>
    <div class="center-label">
      <h2>SKILLS</h2>
      <p>orbit the zero point</p>
    </div>
  </div>
  <div class="panel" id="p3">
    <div class="label">pricing</div>
    <div class="price-wrap">
      <div class="price-word">expensive</div>
      <div class="price-sub">worth every bit of it</div>
    </div>
  </div>
  <div class="panel" id="p4">
    <div class="contact-inner">
      <div class="contact-left"><h2>CON<br>TACT</h2></div>
      <div class="contact-right">
        <input type="text" placeholder="name">
        <input type="email" placeholder="email">
        <input type="tel" placeholder="phone">
        <textarea placeholder="message"></textarea>
        <button class="btn">submit</button>
      </div>
    </div>
  </div>
</div>

<div id="dots">
  <div class="dot active" onclick="goTo(0)"></div>
  <div class="dot" onclick="goTo(1)"></div>
  <div class="dot" onclick="goTo(2)"></div>
  <div class="dot" onclick="goTo(3)"></div>
  <div class="dot" onclick="goTo(4)"></div>
</div>

<script>
// CURSOR
const cur=document.getElementById('cur'), cur2=document.getElementById('cur2');
let mx=0,my=0,cx=0,cy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
setInterval(()=>{cx+=(mx-cx)*0.15;cy+=(my-cy)*0.15;cur2.style.left=cx+'px';cur2.style.top=cy+'px';},16);

// BG CANVAS — particle field
const bg=document.getElementById('bg');
const bctx=bg.getContext('2d');
let bW,bH,stars=[],frame=0;
function resizeBg(){bW=bg.width=window.innerWidth;bH=bg.height=window.innerHeight;}
resizeBg();window.addEventListener('resize',resizeBg);
for(let i=0;i<400;i++)stars.push({x:Math.random()*5000,y:Math.random()*3000,r:Math.random()*1.2+0.2,o:Math.random(),s:Math.random()*0.01+0.003});
function drawBg(){
  bctx.fillStyle='rgba(0,0,0,0.2)';
  bctx.fillRect(0,0,bW,bH);
  stars.forEach(s=>{
    s.o+=s.s;
    const op=0.2+0.5*Math.abs(Math.sin(s.o));
    bctx.beginPath();
    bctx.arc((s.x%bW),(s.y%bH),s.r,0,Math.PI*2);
    bctx.fillStyle=`rgba(255,255,255,${op})`;
    bctx.fill();
  });
  frame++;
  requestAnimationFrame(drawBg);
}
drawBg();

// INTRO
const intro=document.getElementById('intro');
const introText=document.getElementById('intro-text');
let introGone=false;
setTimeout(()=>{
  introText.style.opacity='0';
  setTimeout(()=>{intro.style.display='none';introGone=true;},500);
},1800);

// PANELS
let current=0;
const panels=document.getElementById('panels');
const dots=document.querySelectorAll('.dot');
function goTo(n){
  current=Math.max(0,Math.min(4,n));
  panels.style.transform=`translateX(-${current*100}vw)`;
  dots.forEach((d,i)=>d.classList.toggle('active',i===current));
  if(current===1) revealAbout();
  if(current===2) startSkills();
}

// WHEEL / TOUCH
let locked=false;
window.addEventListener('wheel',e=>{
  if(locked)return;
  locked=true;
  if(e.deltaY>30) goTo(current+1);
  else if(e.deltaY<-30) goTo(current-1);
  setTimeout(()=>locked=false,1000);
},{passive:true});

let tx=0;
window.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
window.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){dx<0?goTo(current+1):goTo(current-1);}
},{passive:true});

// ABOUT — word-by-word reveal
const words='finding patterns in complex systems within e-commerce making them predictable and applicable'.split(' ');
const aboutEl=document.getElementById('aboutText');
words.forEach(w=>{const s=document.createElement('span');s.textContent=w+' ';aboutEl.appendChild(s);});
let aboutDone=false;
function revealAbout(){
  if(aboutDone)return;aboutDone=true;
  const spans=aboutEl.querySelectorAll('span');
  spans.forEach((s,i)=>setTimeout(()=>{s.style.opacity='1';s.style.transform='translateY(0)';},i*80));
}

// SKILLS — orbiting canvas
const sc=document.getElementById('skillCanvas');
const sctx=sc.getContext('2d');
let sW,sH,skillsRunning=false;
function resizeSc(){sW=sc.width=sc.offsetWidth;sH=sc.height=sc.offsetHeight;}
resizeSc();window.addEventListener('resize',resizeSc);

const skillData=[
  {label:'operational optimization',orbit:0.28,speed:0.004,angle:0,size:14},
  {label:'architecture',orbit:0.18,speed:0.007,angle:2.1,size:16},
  {label:'automation',orbit:0.22,speed:-0.005,angle:4.2,size:15},
  {label:'e-commerce',orbit:0.35,speed:0.003,angle:1.0,size:13},
  {label:'systems thinking',orbit:0.38,speed:-0.004,angle:3.3,size:13},
  {label:'pattern recognition',orbit:0.42,speed:0.002,angle:0.5,size:12},
];

function drawSkills(){
  if(!skillsRunning)return;
  sctx.clearRect(0,0,sW,sH);
  const cx=sW/2,cy=sH/2;

  // Rings
  skillData.forEach(s=>{
    sctx.beginPath();
    sctx.arc(cx,cy,s.orbit*Math.min(sW,sH),0,Math.PI*2);
    sctx.strokeStyle='rgba(255,255,255,0.04)';
    sctx.lineWidth=1;
    sctx.stroke();
  });

  // Origin
  sctx.beginPath();
  sctx.arc(cx,cy,3,0,Math.PI*2);
  sctx.fillStyle='rgba(255,255,255,0.6)';
  sctx.fill();

  // Skill nodes
  skillData.forEach(s=>{
    s.angle+=s.speed;
    const r=s.orbit*Math.min(sW,sH);
    const x=cx+Math.cos(s.angle)*r;
    const y=cy+Math.sin(s.angle)*r;

    // Line to center
    sctx.beginPath();
    sctx.moveTo(cx,cy);
    sctx.lineTo(x,y);
    sctx.strokeStyle='rgba(255,255,255,0.06)';
    sctx.lineWidth=0.5;
    sctx.stroke();

    // Dot
    sctx.beginPath();
    sctx.arc(x,y,3,0,Math.PI*2);
    sctx.fillStyle='#fff';
    sctx.fill();

    // Label
    sctx.font=`${s.size}px Inter`;
    sctx.fillStyle='rgba(255,255,255,0.8)';
    sctx.textAlign=x<cx?'right':'left';
    sctx.fillText(s.label, x+(x<cx?-10:10), y+5);
  });

  requestAnimationFrame(drawSkills);
}

function startSkills(){
  if(skillsRunning)return;
  skillsRunning=true;
  drawSkills();
}

// KEYBOARD
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') goTo(current+1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') goTo(current-1);
});
</script>
</body>
</html>
