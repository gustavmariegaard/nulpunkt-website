<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nulpunkt</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Inter',sans-serif;cursor:none !important;}
canvas{position:fixed;inset:0;z-index:0;}
*{cursor:none !important;}

#intro{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;cursor:none;background:#000;}
#intro-text{font-family:'Space Mono',monospace;font-size:clamp(4rem,12vw,10rem);font-weight:700;letter-spacing:0.1em;color:#fff;user-select:none;transition:opacity 0.5s;}

#cur{display:none;}
#cur2{position:fixed;width:40px;height:40px;border-radius:50%;background:#fff;pointer-events:none;z-index:9999;will-change:transform;transform:translate(-50%,-50%);mix-blend-mode:difference;}



#panels{position:fixed;inset:0;z-index:10;display:flex;width:500vw;transition:transform 0.9s cubic-bezier(0.77,0,0.175,1);}
.panel{width:100vw;height:100vh;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}

#nav-arrows{position:fixed;right:2rem;bottom:2rem;z-index:50;display:flex;flex-direction:row;gap:0.5rem;mix-blend-mode:difference;}
.arrow-btn{width:36px;height:36px;border:1px solid rgba(255,255,255,0.3);border-radius:50%;background:transparent;color:#fff;font-size:0.9rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
.arrow-btn:hover{background:rgba(255,255,255,0.15);border-color:#fff;}

/* P0 — PULSAR HERO */
#p0 canvas{position:absolute;inset:0;width:100%;height:100%;}

#p0 .manifesto{position:absolute;bottom:3rem;left:3rem;z-index:2;max-width:320px;font-size:0.65rem;line-height:1.8;color:rgba(255,255,255,0.25);letter-spacing:0.02em;}

/* P1 — ABOUT */
#p1{background:#fff;color:#000;}
#p1 .about-word{font-size:clamp(1.5rem,4vw,3.5rem);font-weight:900;line-height:1.1;max-width:700px;padding:3rem;}
#p1 .about-word span{display:inline-block;opacity:0;transform:translateY(30px);transition:all 0.6s;}
#p1 .label{position:absolute;top:3rem;left:3rem;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:#999;}

/* P2 — SKILLS SOLAR */
#p2{background:#000;}
#p2 canvas{position:absolute;inset:0;width:100%;height:100%;}
#p2 .skills-label{position:absolute;top:3rem;left:3rem;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.3);z-index:2;}

/* P3 — PRICING */
#p3{background:#000;}
#p3 .price-wrap{position:relative;z-index:2;text-align:center;}
#p3 .price-word{font-family:'Space Mono',monospace;font-size:clamp(4rem,12vw,10rem);font-weight:700;letter-spacing:0.1em;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,0.25);transition:all 0.3s;cursor:default;}
#p3 .price-word:hover{-webkit-text-stroke:1px #fff;color:#fff;text-shadow:0 0 80px rgba(255,255,255,0.3);}
#p3 .label{position:absolute;top:3rem;left:3rem;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.3);}

/* P4 — CONTACT */
#p4{background:#fff;color:#000;align-items:stretch;}
#p4 .contact-inner{display:grid;grid-template-columns:1fr 1fr;width:100%;height:100%;padding:3rem;gap:2rem;align-items:center;}
#p4 .contact-left{display:flex;align-items:flex-end;}
#p4 .contact-left h2{font-size:clamp(4rem,10vw,9rem);font-weight:900;line-height:0.85;letter-spacing:-0.03em;color:#000;}
#p4 .contact-right{background:rgba(0,0,0,0.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid rgba(0,0,0,0.08);border-radius:16px;padding:2rem;display:flex;flex-direction:column;gap:0.75rem;}
input,textarea{width:100%;padding:0.85rem 1rem;background:rgba(0,0,0,0.03);border:0.5px solid rgba(0,0,0,0.1);border-radius:10px;color:#000;font-family:'Inter',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s,background 0.2s;resize:none;}
input::placeholder,textarea::placeholder{color:rgba(0,0,0,0.3);}
input:focus,textarea:focus{border-color:rgba(0,0,0,0.3);background:rgba(0,0,0,0.06);}
textarea{height:100px;}
.btn{padding:0.9rem;background:#000;color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:0.8rem;letter-spacing:0.15em;cursor:pointer;transition:opacity 0.2s;text-transform:lowercase;}
.btn:hover{opacity:0.75;}

@media(max-width:700px){
  nav ul{display:none;}
  #p4 .contact-inner{grid-template-columns:1fr;overflow-y:auto;}
  #p4 .contact-left{align-items:flex-start;border-right:none;border-bottom:1px solid rgba(0,0,0,0.1);padding:2rem;}
  #p4 .contact-right{padding:2rem;}
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur2"></div>

<canvas id="bg"></canvas>

<div id="intro"><div id="intro-text">nulpunkt</div></div>

<div id="panels">

  <div class="panel" id="p0">
    <canvas id="pulsarCanvas"></canvas>



  <div class="panel" id="p1">
    <div class="label">about</div>
    <div class="about-word" id="aboutText"></div>
  </div>

  <div class="panel" id="p2">
    <canvas id="skillCanvas"></canvas>
    <div class="skills-label">skills</div>
  </div>

  <div class="panel" id="p3">
    <div class="label">pricing — what it costs</div>
    <div class="price-wrap">
      <div class="price-word">expensive</div>
    </div>
  </div>

  <div class="panel" id="p4">
    <div class="contact-inner">
      <div class="contact-left"><h2>CON<br>TACT</h2></div>
      <div class="contact-right">
        <input type="text" placeholder="name">
        <input type="email" placeholder="email">
        <input type="tel" placeholder="phone">
        <textarea placeholder="message"></textarea>
        <button class="btn">submit</button>
      </div>
    </div>
  </div>

</div>

<div id="nav-arrows">
  <button class="arrow-btn" onclick="goTo(current-1)">←</button>
  <button class="arrow-btn" onclick="goTo(current+1)">→</button>
</div>

<script>
// CURSOR
const cur=document.getElementById('cur'),cur2=document.getElementById('cur2');
let mx=0,my=0,cx=0,cy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';},{passive:true});
setInterval(()=>{cx+=(mx-cx)*0.35;cy+=(my-cy)*0.35;cur2.style.left=cx+'px';cur2.style.top=cy+'px';},16);

// BG STARS
const bg=document.getElementById('bg');
const bctx=bg.getContext('2d');
let bW,bH;
function resizeBg(){bW=bg.width=window.innerWidth;bH=bg.height=window.innerHeight;}
resizeBg();window.addEventListener('resize',resizeBg);
const stars=[];
for(let i=0;i<400;i++)stars.push({x:Math.random()*5000,y:Math.random()*3000,r:Math.random()*1.2+0.2,o:Math.random(),s:Math.random()*0.01+0.003});
function drawBg(){
  bctx.fillStyle='rgba(0,0,0,0.2)';bctx.fillRect(0,0,bW,bH);
  stars.forEach(s=>{
    s.o+=s.s;
    const op=0.2+0.5*Math.abs(Math.sin(s.o));
    bctx.beginPath();bctx.arc(s.x%bW,s.y%bH,s.r,0,Math.PI*2);
    bctx.fillStyle=`rgba(255,255,255,${op})`;bctx.fill();
  });
  requestAnimationFrame(drawBg);
}
drawBg();

// PULSAR
const pc=document.getElementById('pulsarCanvas');
const pctx=pc.getContext('2d');
let pW,pH,pFrame=0;
function resizeP(){pW=pc.width=pc.offsetWidth;pH=pc.height=pc.offsetHeight;}
resizeP();window.addEventListener('resize',resizeP);
function drawPulsar(){
  pctx.fillStyle='rgba(0,0,0,0.18)';pctx.fillRect(0,0,pW,pH);
  const cx=pW/2,cy=pH/2;
  const beamAngle=pFrame*0.016;
  for(let b=0;b<2;b++){
    const a=beamAngle+b*Math.PI;
    const grad=pctx.createLinearGradient(cx,cy,cx+Math.cos(a)*pW,cy+Math.sin(a)*pH);
    grad.addColorStop(0,'rgba(255,255,255,0.3)');
    grad.addColorStop(0.5,'rgba(255,255,255,0.06)');
    grad.addColorStop(1,'rgba(255,255,255,0)');
    pctx.beginPath();pctx.moveTo(cx,cy);
    const sp=0.035;
    pctx.lineTo(cx+Math.cos(a-sp)*pW*2,cy+Math.sin(a-sp)*pH*2);
    pctx.lineTo(cx+Math.cos(a+sp)*pW*2,cy+Math.sin(a+sp)*pH*2);
    pctx.closePath();pctx.fillStyle=grad;pctx.fill();
  }
  for(let r=0;r<5;r++){
    const phase=((pFrame*0.01)+r*0.2)%1;
    const radius=phase*Math.min(pW,pH)*0.55;
    const op=(1-phase)*0.12;
    pctx.beginPath();pctx.arc(cx,cy,radius,0,Math.PI*2);
    pctx.strokeStyle=`rgba(255,255,255,${op})`;pctx.lineWidth=1;pctx.stroke();
  }
  // Core glow
  const cg=pctx.createRadialGradient(cx,cy,0,cx,cy,20);
  cg.addColorStop(0,'rgba(255,255,255,0.9)');
  cg.addColorStop(0.4,'rgba(255,255,255,0.2)');
  cg.addColorStop(1,'rgba(255,255,255,0)');
  pctx.beginPath();pctx.arc(cx,cy,20,0,Math.PI*2);pctx.fillStyle=cg;pctx.fill();
  pctx.beginPath();pctx.arc(cx,cy,3,0,Math.PI*2);pctx.fillStyle='#fff';pctx.fill();
  pFrame++;requestAnimationFrame(drawPulsar);
}
drawPulsar();

// INTRO
const intro=document.getElementById('intro');
setTimeout(()=>{
  document.getElementById('intro-text').style.opacity='0';
  setTimeout(()=>{intro.style.display='none';},500);
},1800);

// PANELS
let current=0,locked=false;
const panels=document.getElementById('panels');
function goTo(n){
  current=Math.max(0,Math.min(4,n));
  panels.style.transform=`translateX(-${current*100}vw)`;
  if(current===1)revealAbout();
  if(current===2)startSkills();
}
window.addEventListener('wheel',e=>{
  if(locked)return;locked=true;
  if(e.deltaY>5)goTo(current+1);
  else if(e.deltaY<-5)goTo(current-1);
  setTimeout(()=>locked=false,1000);
},{passive:true});
let tx=0;
window.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
window.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){dx<0?goTo(current+1):goTo(current-1);}
},{passive:true});
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')goTo(current+1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')goTo(current-1);
});

// ABOUT
const words='finding patterns in complex systems within e-commerce making them predictable and applicable'.split(' ');
const aboutEl=document.getElementById('aboutText');
words.forEach(w=>{const s=document.createElement('span');s.textContent=w+' ';aboutEl.appendChild(s);});
let aboutDone=false;
function revealAbout(){
  if(aboutDone)return;aboutDone=true;
  aboutEl.querySelectorAll('span').forEach((s,i)=>setTimeout(()=>{s.style.opacity='1';s.style.transform='translateY(0)';},i*80));
}

// SOLAR SYSTEM
const sc=document.getElementById('skillCanvas');
const sctx=sc.getContext('2d');
let sW,sH,skillsRunning=false;
function resizeSc(){sW=sc.width=sc.offsetWidth;sH=sc.height=sc.offsetHeight;}
resizeSc();window.addEventListener('resize',resizeSc);
const planets=[
  {label:'operational optimization',orbit:0.12,speed:0.008,angle:0.5,size:3.5,col:'rgba(255,255,255,0.9)'},
  {label:'architecture',orbit:0.19,speed:0.005,angle:2.2,size:5,col:'rgba(255,255,255,0.85)'},
  {label:'automation',orbit:0.26,speed:0.004,angle:4.0,size:4,col:'rgba(255,255,255,0.8)'},
  {label:'e-commerce',orbit:0.33,speed:0.003,angle:1.2,size:6,col:'rgba(255,255,255,0.85)'},
  {label:'systems thinking',orbit:0.39,speed:0.002,angle:3.5,size:3.5,col:'rgba(255,255,255,0.75)'},
  {label:'pattern recognition',orbit:0.44,speed:0.0015,angle:0.8,size:3,col:'rgba(255,255,255,0.7)'},
];
function drawSolar(){
  if(!skillsRunning)return;
  sctx.clearRect(0,0,sW,sH);
  const cx=sW/2,cy=sH/2;
  const base=Math.min(sW,sH)*0.45;

  // Orbit rings — more visible
  planets.forEach(p=>{
    sctx.beginPath();sctx.arc(cx,cy,p.orbit*base*2,0,Math.PI*2);
    sctx.strokeStyle='rgba(255,255,255,0.12)';sctx.lineWidth=0.5;sctx.stroke();
  });

  // Sun glow
  const sg=sctx.createRadialGradient(cx,cy,0,cx,cy,35);
  sg.addColorStop(0,'rgba(255,240,160,1)');
  sg.addColorStop(0.3,'rgba(255,200,60,0.5)');
  sg.addColorStop(0.7,'rgba(255,140,0,0.15)');
  sg.addColorStop(1,'rgba(255,100,0,0)');
  sctx.beginPath();sctx.arc(cx,cy,35,0,Math.PI*2);sctx.fillStyle=sg;sctx.fill();
  sctx.beginPath();sctx.arc(cx,cy,8,0,Math.PI*2);
  sctx.fillStyle='rgba(255,245,180,1)';sctx.fill();

  // Planets
  planets.forEach(p=>{
    p.angle+=p.speed;
    const r=p.orbit*base*2;
    const x=cx+Math.cos(p.angle)*r;
    const y=cy+Math.sin(p.angle)*r;
    // Glow
    const pg=sctx.createRadialGradient(x,y,0,x,y,p.size*3);
    pg.addColorStop(0,'rgba(255,255,255,0.25)');pg.addColorStop(1,'rgba(255,255,255,0)');
    sctx.beginPath();sctx.arc(x,y,p.size*3,0,Math.PI*2);sctx.fillStyle=pg;sctx.fill();
    // Planet
    sctx.beginPath();sctx.arc(x,y,p.size,0,Math.PI*2);sctx.fillStyle=p.col;sctx.fill();
    // Label — clamped inside canvas
    sctx.font='12px Inter';
    sctx.fillStyle='rgba(255,255,255,0.55)';
    const side=x>cx?1:-1;
    const lx=x+side*(p.size+8);
    const ly=Math.max(16,Math.min(sH-8,y+4));
    sctx.textAlign=side>0?'left':'right';
    // Clamp label horizontally
    const measure=sctx.measureText(p.label).width;
    const clampedLx=side>0?Math.min(lx,sW-measure-8):Math.max(lx,measure+8);
    sctx.fillText(p.label,clampedLx,ly);
  });
  requestAnimationFrame(drawSolar);
}
function startSkills(){
  if(skillsRunning)return;skillsRunning=true;drawSolar();
}
</script>
</body>
</html>
